# oauth-connect's /callback route is hit directly by the OAuth provider's
# browser redirect, which carries no Supabase JWT — the function verifies the
# caller itself (via the `state` row) for /start, and /callback is keyed by
# an unguessable one-time state token, so the platform-level JWT gate must be
# off or every OAuth connect would 401 before reaching our code.
[functions.oauth-connect]
verify_jwt = false

# dev-session establishes the browser's very first session — by definition
# there's no JWT to send yet, so the platform-level gate must be off. The
# real dev-account password never leaves this function (it's a secret, not a
# client env var), so there's nothing for a caller to forge their way into.
[functions.dev-session]
verify_jwt = false
